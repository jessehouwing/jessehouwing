# This workflow is managed by gh actions-lock.

name: Update Scrum Classes
on:
  schedule: # Run workflow automatically
    - cron: '18 18 * * *' 
  workflow_dispatch:
  
jobs:
  update-readme-with-scrumclasses:
    name: Update GitHub profile
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            www.scrum.org:443

      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Update classes on GitHub profile
        uses: ./.github/actions/update-scrum-classes
        with:
          trainer_id: 76
          user_agent: 'JesseHouwingScript'
  update-blog-with-scrumclasses:
    runs-on: ubuntu-latest
    name: Update Ghost Blog
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            scrumbug.ghost.io:443
            www.scrum.org:443

      - name: Update classes on Ghost Blog
        uses: ./.github/actions/update-scrum-classes-on-ghost
        with:
          trainer_id: 76
          user_agent: 'JesseHouwingScript'
          ghost_token: ${{ secrets.GHOST_TOKEN }}
