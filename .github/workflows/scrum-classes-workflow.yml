name: Update Scrum Classes
on:
  schedule: # Run workflow automatically
    - cron: '18 18 * * *' 
  workflow_dispatch:
  
jobs:
  update-readme-with-scrumclasses:
    name: Update GitHub profile
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Update classes on GitHub profile
        uses: jessehouwing/jessehouwing/.github/actions/update-scrum-classes@6df99bbef281985c1ffd6496623d09e082e17481 # main
        with:
          trainer_id: 76
          user_agent: 'JesseHouwingScript'
  update-blog-with-scrumclasses:
    runs-on: ubuntu-latest
    name: Update Ghost Blog
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Update classes on Ghost Blog
        uses: jessehouwing/jessehouwing/.github/actions/update-scrum-classes-on-ghost@6df99bbef281985c1ffd6496623d09e082e17481 # main
        with:
          trainer_id: 76
          user_agent: 'JesseHouwingScript'
          ghost_token: ${{ secrets.GHOST_TOKEN }}
